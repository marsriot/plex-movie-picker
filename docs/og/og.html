<!doctype html>
<html>
<head>
<meta charset="utf-8" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet" />
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 1280px; height: 640px; }
  body {
    font-family: 'Space Grotesk', sans-serif;
    background:
      radial-gradient(900px 520px at 100% -12%, rgba(229,160,13,.18), transparent 60%),
      radial-gradient(820px 520px at -12% 112%, rgba(194,100,254,.15), transparent 55%),
      #0d0d12;
    color: #ececf2;
    overflow: hidden;
    position: relative;
  }
  .strip { position: absolute; left: 0; right: 0; height: 26px; background: #08080c; }
  .strip.top { top: 0; } .strip.bot { bottom: 0; }
  .strip::before, .strip::after {
    content: ''; position: absolute; left: 0; right: 0; height: 7px;
    background-image: repeating-linear-gradient(to right, rgba(245,238,220,.85) 0 9px, transparent 9px 22px);
  }
  .strip::before { top: 5px; } .strip::after { bottom: 5px; }

  .wrap { position: absolute; inset: 26px 0; display: flex; align-items: center; padding: 0 72px; gap: 30px; }
  .left { flex: 1; }
  .brand { display: flex; align-items: center; gap: 22px; }
  .reel { width: 78px; height: 78px; color: #e5a00d; filter: drop-shadow(0 0 20px rgba(229,160,13,.5)); }
  .word {
    font-family: 'Bebas Neue', sans-serif; font-size: 104px; line-height: .8; letter-spacing: .04em;
    background: linear-gradient(180deg, #ffffff 6%, #f3c97a 52%, #e5a00d 100%);
    -webkit-background-clip: text; background-clip: text; color: transparent;
  }
  .tag { font-size: 38px; font-weight: 700; margin-top: 30px; color: #fff; letter-spacing: -0.01em; }
  .sub { font-size: 23px; color: #9a9ab0; margin-top: 16px; line-height: 1.5; }
  .feats { display: flex; gap: 13px; margin-top: 34px; }
  .chip { font-size: 21px; padding: 10px 18px; border-radius: 999px; background: #1b1b27; border: 1px solid #2a2a3a; }
  .foot { margin-top: 36px; font-size: 19px; color: #e5a00d; letter-spacing: .08em; font-weight: 700; }

  .right { width: 320px; height: 100%; display: flex; align-items: center; justify-content: center; }
  .phone {
    height: 538px; width: auto; border-radius: 28px; transform: rotate(-5deg);
    box-shadow: 0 30px 70px rgba(0,0,0,.6), 0 0 0 1px #2a2a3a, 0 0 70px rgba(229,160,13,.20);
  }
</style>
</head>
<body>
  <div class="strip top"></div>
  <div class="wrap">
    <div class="left">
      <div class="brand">
        <svg class="reel" viewBox="0 0 64 64">
          <circle cx="32" cy="32" r="21" fill="none" stroke="currentColor" stroke-width="4" />
          <g fill="currentColor">
            <circle cx="32" cy="32" r="5.5" /><circle cx="44" cy="32" r="3.4" />
            <circle cx="38" cy="21.6" r="3.4" /><circle cx="26" cy="21.6" r="3.4" />
            <circle cx="20" cy="32" r="3.4" /><circle cx="26" cy="42.4" r="3.4" />
            <circle cx="38" cy="42.4" r="3.4" />
          </g>
        </svg>
        <span class="word">REEL PICK</span>
      </div>
      <div class="tag">Stop scrolling. Start watching.</div>
      <div class="sub">Your Plex library, minus the decision paralysis —<br>AI-powered picks for what to watch tonight.</div>
      <div class="feats">
        <span class="chip">🎭 Mood picks</span>
        <span class="chip">⚔️ Bracket</span>
        <span class="chip">💎 Hidden gems</span>
      </div>
      <div class="foot">SELF-HOSTED · PLEX × CLAUDE</div>
    </div>
    <div class="right">
      <img class="phone" src="../mobile-mood.png" />
    </div>
  </div>
  <div class="strip bot"></div>
</body>
</html>
